name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, xml, redis
          coverage: none

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist

      - name: Security audit
        run: composer run security:audit || true

      - name: Static analysis (PHPStan)
        run: |
          composer run static:analysis || true

      - name: Run tests
        run: |
          php artisan test --no-interaction
